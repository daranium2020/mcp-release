name: 'MCP Release - Release Checker'
description: >
  Connects to a remote MCP server, validates tool definitions, and produces
  a structured report. Tools are never invoked.

inputs:
  endpoint:
    description: 'MCP server URL to validate (https:// required in production)'
    required: true
  bearer-token-env:
    description: >
      Name of an environment variable that holds a Bearer token. The action reads
      the variable value and adds Authorization: Bearer <token> to every request.
      Set the variable in the env block of the job step using a GitHub secret.
    required: false
    default: ''
  header:
    description: >
      Newline-separated additional request headers in "Name: value" format.
      Example: "X-API-Key: my-key\nX-Tenant-Id: acme"
    required: false
    default: ''
  header-env:
    description: >
      Newline-separated header/env-var pairs in "Name=ENV_VAR" format.
      The action reads each variable and adds the corresponding header.
      Example: "X-API-Key=MY_API_KEY\nX-Custom=MY_CUSTOM"
    required: false
    default: ''
  timeout-ms:
    description: 'Request timeout in milliseconds'
    required: false
    default: '10000'
  fail-on:
    description: 'Severity threshold that fails the action: "warning" or "fail"'
    required: false
    default: 'fail'
  format:
    description: 'Report format to write: "json", "markdown", or "both"'
    required: false
    default: 'markdown'
  output-directory:
    description: 'Directory for written report files (defaults to RUNNER_TEMP)'
    required: false
    default: ''
  development-mode:
    description: 'Allow HTTP connections to localhost (for testing only, NOT production)'
    required: false
    default: 'false'

outputs:
  status:
    description: 'Overall validation status: PASS, WARNING, or FAIL'
  failures:
    description: 'Number of FAIL findings'
  warnings:
    description: 'Number of WARNING findings'
  tools:
    description: 'Number of tools discovered'
  report-path:
    description: 'Absolute path to the written report file (if a single format was selected)'
  pass-count:
    description: 'Number of PASS findings'
  warning-count:
    description: 'Number of WARNING findings'
  fail-count:
    description: 'Number of FAIL findings'
  report-json:
    description: 'Absolute path to the written JSON report (if format includes json)'
  report-markdown:
    description: 'Absolute path to the written Markdown report (if format includes markdown)'

runs:
  using: 'node20'
  main: 'dist/index.js'
