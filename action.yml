name: 'MCP Release - Release Checker'
description: >
  Validates an MCP server — remote (HTTP/SSE) or local (stdio) — validates tool
  definitions, and produces a structured report. Tools are never invoked.

inputs:
  transport:
    description: 'Transport to use: "http" (default) or "stdio"'
    required: false
    default: 'http'
  endpoint:
    description: 'MCP server URL to validate (https:// required in production). Required when transport is "http".'
    required: false
    default: ''
  command:
    description: >
      Command to run the stdio MCP server. Required when transport is "stdio".
      Example: "npx -y my-mcp-server" or "node ./dist/server.js"
      Set credentials via the env block of the step, not here.
    required: false
    default: ''
  working-directory:
    description: 'Working directory for the stdio server process (used with transport: stdio)'
    required: false
    default: ''
  bearer-token-env:
    description: >
      Name of an environment variable that holds a Bearer token. The action reads
      the variable value and adds Authorization: Bearer <token> to every request.
      Set the variable in the env block of the job step using a GitHub secret.
    required: false
    default: ''
  header:
    description: >
      Newline-separated additional request headers in "Name: value" format.
      For non-secret headers only. Values written here appear in plaintext in
      your workflow YAML. Use header-env or bearer-token-env for secrets.
      Example: "X-Tenant-Id: acme\nX-Version: 2"
    required: false
    default: ''
  header-env:
    description: >
      Newline-separated header/env-var pairs in "Name=ENV_VAR" format.
      The action reads each variable and adds the corresponding header.
      Example: "X-API-Key=MY_API_KEY\nX-Custom=MY_CUSTOM"
    required: false
    default: ''
  timeout-ms:
    description: 'Request/startup timeout in milliseconds'
    required: false
    default: '10000'
  fail-on:
    description: 'Severity threshold that fails the action: "warning" or "fail"'
    required: false
    default: 'fail'
  format:
    description: 'Report format to write: "json", "markdown", or "both"'
    required: false
    default: 'markdown'
  output-directory:
    description: 'Directory for written report files (defaults to RUNNER_TEMP)'
    required: false
    default: ''
  development-mode:
    description: 'Allow HTTP connections to localhost (for testing only, NOT production)'
    required: false
    default: 'false'

outputs:
  status:
    description: 'Overall validation status: PASS, WARNING, or FAIL'
  failures:
    description: 'Number of FAIL findings'
  warnings:
    description: 'Number of WARNING findings'
  tools:
    description: 'Number of tools discovered'
  report-path:
    description: 'Absolute path to the written report file (if a single format was selected)'
  pass-count:
    description: 'Number of PASS findings'
  warning-count:
    description: 'Number of WARNING findings'
  fail-count:
    description: 'Number of FAIL findings'
  report-json:
    description: 'Absolute path to the written JSON report (if format includes json)'
  report-markdown:
    description: 'Absolute path to the written Markdown report (if format includes markdown)'

runs:
  using: 'node24'
  main: 'packages/github-action/dist/index.js'
