name: CI

on:
  push:
    branches:
      - main
      - 'milestone-*/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: '10.28.0'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.14.0'
          cache: 'pnpm'

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify GitHub Action bundle is current
        run: |
          # Rebuild the action bundle and check whether it differs from what is committed.
          # A diff means the bundle was not updated before commit.
          pnpm --filter @mcp-release/github-action run build
          if ! git diff --quiet packages/github-action/dist/index.js; then
            echo "::error::GitHub Action bundle is out of date."
            echo "Run 'pnpm --filter @mcp-release/github-action run build' and commit packages/github-action/dist/index.js."
            exit 1
          fi
