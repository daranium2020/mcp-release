name: CI

on:
  push:
    branches:
      - main
      - 'milestone-*/**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: '11.9.0'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify GitHub Action bundle is current
        run: |
          # Rebuild the action bundle and check whether it differs from what is committed.
          # A diff means the bundle was not updated before commit.
          pnpm --filter @mcp-launch/github-action run build
          if ! git diff --quiet packages/github-action/dist/index.js; then
            echo "::error::GitHub Action bundle is out of date."
            echo "Run 'pnpm --filter @mcp-launch/github-action run build' and commit packages/github-action/dist/index.js."
            exit 1
          fi
